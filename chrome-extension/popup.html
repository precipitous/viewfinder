<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 350px; padding: 16px; font-family: -apple-system, sans-serif;
           background: #0d1117; color: #c9d1d9; }
    h2 { color: #58a6ff; margin-bottom: 12px; font-size: 16px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #30363d; border-radius: 4px;
            background: #161b22; color: #c9d1d9; font-size: 13px; margin-bottom: 12px; }
    button { width: 100%; padding: 10px; border: none; border-radius: 4px;
             background: #238636; color: white; font-size: 14px; cursor: pointer; }
    button:hover { background: #2ea043; }
    .status { font-size: 12px; color: #8b949e; margin-top: 8px; }
    .saved { color: #3fb950; }
  </style>
</head>
<body>
  <h2>Viewfinder Settings</h2>

  <label>Server URL</label>
  <input type="text" id="server" placeholder="http://localhost:8080" />

  <label>API Key (optional)</label>
  <input type="text" id="apikey" placeholder="vf-..." />

  <button id="save">Save Settings</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
